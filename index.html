<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Arthur 2D Duengon Game Project | Backtracking Alpro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050505; 
            font-family: 'VT323', monospace;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(0,0,0,0) 50%, rgba(0,0,0,0.85) 100%);
            pointer-events: none;
            z-index: 10;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.1) 50%,
                rgba(0,0,0,0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 11;
            opacity: 0.6;
        }
        
        canvas {
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #mobile-controls {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 0;
            width: 100vw;
            padding: 0 30px;
            box-sizing: border-box;
            justify-content: space-between;
            z-index: 20;
        }
        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
        }
        .dpad {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 5px;
        }
        .dpad button, .action-btns button {
            background: rgba(20, 20, 25, 0.75);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-family: 'VT323', monospace;
            font-size: 24px;
            border-radius: 8px;
            outline: none;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        .dpad button:active, .action-btns button:active {
            background: rgba(255, 255, 255, 0.4);
        }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }
        #btn-right { grid-column: 3; grid-row: 2; }
        .action-btns {
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }
        .action-btns button {
            width: 70px;
            height: 70px;
            border-radius: 50%;
        }
        #btn-attack {
            width: 90px;
            height: 90px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div id="mobile-controls">
        <div class="dpad">
            <button id="btn-up">W</button>
            <button id="btn-left">A</button>
            <button id="btn-down">S</button>
            <button id="btn-right">D</button>
        </div>
        <div class="action-btns">
            <button id="btn-potion">HEAL</button>
            <button id="btn-attack">ATK</button>
        </div>
    </div>
    <script type="module" src="./script/main.js"></script>
</body>
</html>
